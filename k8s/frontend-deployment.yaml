apiVersion: apps/v1
kind: Deployment
metadata:
  name: decimas-frontend
  namespace: decimas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decimas-frontend
  template:
    metadata:
      labels:
        app: decimas-frontend
    spec:
      containers:
        - name: frontend
          image: <ECR_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/decimas-frontend
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
