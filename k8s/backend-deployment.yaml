apiVersion: apps/v1
kind: Deployment
metadata:
  name: decimas-backend
  namespace: decimas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decimas-backend
  template:
    metadata:
      labels:
        app: decimas-backend
    spec:
      containers:
        - name: backend
          image: 315430030373.dkr.ecr.us-east-1.amazonaws.com/devopsdecimaseks:${IMAGE_TAG}
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "decimas-db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_NAME
              value: "decimas_db"
            - name: DB_PORT
              value: "3306"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
