apiVersion: apps/v1
kind: Deployment
metadata:
  name: decimas-db
  namespace: decimas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: decimas-db
  template:
    metadata:
      labels:
        app: decimas-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: initdb
          configMap:
            name: mysql-initdb
